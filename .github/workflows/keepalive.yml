# Ping Render free-tier every 5 minutes so the API does not cold-start (~15s).
name: Keep backend warm

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /alive
        run: |
          set -e
          URL="${{ vars.BACKEND_ALIVE_URL }}"
          if [ -z "$URL" ]; then
            URL="https://dcn-page.onrender.com/alive"
          fi
          curl -fsS --max-time 60 "$URL"
          echo "OK: $URL"
